<!DOCTYPE html>
<html>
<head>
  <title>Google Search</title>
  <style>
    body { font-family: arial, sans-serif; text-align: center; margin-top: 150px; background-color: #fff; }
    .logo { font-size: 90px; font-weight: bold; margin-bottom: 20px; }
    .g1 { color: #4285F4; } .o1 { color: #EA4335; } .o2 { color: #FBBC05; } .g2 { color: #4285F4; } .l { color: #34A853; } .e { color: #EA4335; }
    .search-bar { width: 500px; padding: 12px 20px; border: 1px solid #dfe1e5; border-radius: 24px; font-size: 16px; outline: none; margin-bottom: 30px; }
    .search-bar:hover { box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color: rgba(223,225,229,0); }
    .btn { background-color: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; font-size: 14px; margin: 11px 4px; padding: 0 16px; line-height: 36px; cursor: pointer; }
    .footer { margin-top: 50px; color: #70757a; font-size: 14px; }
  </style>
</head>
<body>
  <div class="logo">
    <span class="g1">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
  </div>
  <input type="text" class="search-bar" placeholder="Search Google or type a URL"><br>
  <button class="btn">Google Search</button>
  <button class="btn">I'm Feeling Lucky</button>
  <div class="footer">
    <p>Network Simulation Environment | Internet Services</p>
    <p style="color: #34A853;">Status: Connected to BGP AS300</p>
  </div>
</body>
</html>
