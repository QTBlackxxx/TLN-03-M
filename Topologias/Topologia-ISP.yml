name: ISP-TDP-CLARO-IOL

topology:
  nodes:
  
    ############################################
    #                  AS300                   #
    ############################################

    AS300:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/R-AS300_cfg.partial
      mgmt-ipv4: 172.20.20.2

    PC1-INTERNET:
      kind: linux
      image: alpine:3.23
      binds:
        - configs/internet.html:/usr/share/nginx/html/internet.html
      exec:
        - ip addr add 8.8.8.8/24 dev eth1
        - ip route del default
        - ip route add default via 8.8.8.1
    #########################################
    #    Head Quarter (Oficina Principal)
    #
    #########################################

    CPE-HQ:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/CPE_HQ_cfg.partial
      mgmt-ipv4: 172.20.20.3

    CPE-HQ-BACK:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      mgmt-ipv4: 172.20.20.4
    SW-PISO1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.12.1
      type: l2
      startup-config: configs/SW-PISO1_cfg.partial
      mgmt-ipv4: 172.20.20.5
    SW-PISO2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.12.1
      type: l2
      startup-config: configs/SW-PISO2_cfg.partial
      mgmt-ipv4: 172.20.20.6
    PC1-VLAN10:
      kind: linux
      image: alpine:3.23

    PC2-VLAN10:
      kind: linux
      image: alpine:3.23

    PC3-VLAN20:
      kind: linux
      image: alpine:3.23

    PC4-VLAN20:
      kind: linux
      image: alpine:3.23

    #########################################
    #    Movistar (AS 100)
    #
    #########################################
    M1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/M1_cfg.partial
      mgmt-ipv4: 172.20.20.7
    M2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/M2_cfg.partial
      mgmt-ipv4: 172.20.20.8

    M3:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/M3_cfg.partial
      mgmt-ipv4: 172.20.20.9
    M4:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/M4_cfg.partial
      mgmt-ipv4: 172.20.20.10
    #########################################
    #    Branch Office (Oficina Remota)
    #
    #########################################
    CPE-BRANCH:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/CPE_BRANCH_cfg.partial
      mgmt-ipv4: 172.20.20.11
    CPE-BRANCH-BACK:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/CPE_BRANCH_BACK_cfg.partial
      mgmt-ipv4: 172.20.20.12

    SW-R-PISO1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.12.1
      type: l2
      startup-config: configs/SW-R-PISO1_cfg.partial
      mgmt-ipv4: 172.20.20.13 

    SW-R-PISO2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.12.1
      type: l2
      startup-config: configs/SW-R-PISO2_cfg.partial
      mgmt-ipv4: 172.20.20.14

    PC1-R-VLAN5:
      kind: linux
      image: alpine:3.23

    PC2-R-VLAN5:
      kind: linux
      image: alpine:3.23

    PC3-R-VLAN15:
      kind: linux
      image: alpine:3.23

    PC4-R-VLAN15:
      kind: linux
      image: alpine:3.23
    
    #########################################
    #    Claro (AS 200)
    #
    #########################################
    C1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/C1_cfg.partial
      mgmt-ipv4: 172.20.20.15

    C2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/C2_cfg.partial
      mgmt-ipv4: 172.20.20.16

    C3:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/C3_cfg.partial
      mgmt-ipv4: 172.20.20.17

    C4:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/C4_cfg.partial
      mgmt-ipv4: 172.20.20.18

    C5:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.12.1
      startup-config: configs/C5_cfg.partial
      mgmt-ipv4: 172.20.20.19

  links:

    #########################################
    # ENLACES A INTERNET AS 300
    #########################################
    - endpoints: [ "AS300:e0/1", "M2:e0/3" ]
    - endpoints: [ "AS300:e0/2", "C2:e1/1" ]
    - endpoints: [ "AS300:e0/3", "PC1-INTERNET:eth1" ]

    #########################################
    #
    # Enlaces dentro del ISP Movistar
    #
    #########################################
    - endpoints: [ "M1:e1/0", "CPE-HQ:e0/1" ]
    - endpoints: [ "M1:e0/1", "M2:e0/1" ]
    - endpoints: [ "M1:e0/2", "M3:e0/1" ]
    - endpoints: [ "M1:e0/3", "M4:e0/1" ]
    - endpoints: [ "M2:e0/2", "M4:e0/2" ]
    - endpoints: [ "M3:e0/2", "M4:e0/3" ]

    ########## ENLACES PARA EL BRANCH #################
    - endpoints: [ "M3:e0/3", "CPE-BRANCH:e0/1" ]

    #########################################
    #
    # Enlaces dentro del ISP Claro
    #
    #########################################
    - endpoints: [ "C5:e1/1", "CPE-HQ-BACK:e0/1" ]
    - endpoints: [ "C1:e1/0", "CPE-BRANCH-BACK:e0/1" ]
    - endpoints: [ "C2:e0/1", "C3:e0/1" ]
    - endpoints: [ "C2:e0/2", "C4:e0/1" ]
    - endpoints: [ "C2:e1/0", "C1:e0/1" ]
    - endpoints: [ "C3:e0/2", "M4:e1/0" ]
    - endpoints: [ "C4:e0/2", "M4:e1/1" ]
    - endpoints: [ "C5:e0/2", "C4:e0/3" ]
    - endpoints: [ "C5:e0/3", "C3:e0/3" ]
    - endpoints: [ "C5:e0/1", "C2:e0/3" ]
    - endpoints: [ "C5:e1/0", "C1:e0/2" ]

    #########################################
    # Enlaces dentro del Head Quarter
    #########################################
    - endpoints: [ "CPE-HQ:e0/2", "SW-PISO1:e0/1" ]
    - endpoints: [ "CPE-HQ-BACK:e0/2", "SW-PISO1:e1/1" ]
    - endpoints: [ "SW-PISO1:e0/2", "SW-PISO2:e0/1" ]
    - endpoints: [ "SW-PISO1:e0/3", "PC1-VLAN10:eth1" ]
    - endpoints: [ "SW-PISO1:e1/0", "PC2-VLAN10:eth1" ]
    - endpoints: [ "SW-PISO2:e0/2", "PC3-VLAN20:eth1" ]
    - endpoints: [ "SW-PISO2:e0/3", "PC4-VLAN20:eth1" ]

    #########################################
    # Enlaces dentro del Branch Office
    #########################################
    - endpoints: [ "CPE-BRANCH:e0/2", "SW-R-PISO1:e0/1" ]
    - endpoints: [ "CPE-BRANCH-BACK:e0/2", "SW-R-PISO1:e1/1" ]
    - endpoints: [ "SW-R-PISO1:e0/2", "SW-R-PISO2:e0/1" ]
    - endpoints: [ "SW-R-PISO1:e0/3", "PC1-R-VLAN5:eth1" ]
    - endpoints: [ "SW-R-PISO1:e1/0", "PC2-R-VLAN5:eth1" ]
    - endpoints: [ "SW-R-PISO2:e0/2", "PC3-R-VLAN15:eth1" ]
    - endpoints: [ "SW-R-PISO2:e0/3", "PC4-R-VLAN15:eth1" ]
